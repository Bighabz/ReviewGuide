name: Deploy backend

# Redundant deploy trigger for the Railway backend. Railway's GitHub
# integration (configured in the Railway dashboard) is the primary
# auto-deploy mechanism; this workflow is a belt-and-suspenders safety
# net so a silent webhook disconnect — exactly what happened between
# 2026-05-20 and 2026-05-25 — can't again result in four days of
# undeployed commits sitting on `main`.
#
# Activation requirements:
#   1. RAILWAY_TOKEN secret added to the GitHub repo (Settings →
#      Secrets and variables → Actions). Must be a PROJECT-SCOPED token,
#      not an account/personal token. Generate via:
#         Railway dashboard → reviewguide-backend → Settings → Tokens → New Token
#      Select environment "production" when prompted.
#      Account-level tokens are rejected by Railway for project-deploy actions.
#   2. The Railway CLI on this runner uses the token to authenticate,
#      uploads the checked-out source, and triggers a fresh build on Railway.
#
# If RAILWAY_TOKEN is missing, the step fails cleanly (one log line
# saying so) rather than ghosting. That's by design — better to see
# a red X than to silently no-op.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on main pushes. Manual dispatch is allowed for one-off
    # redeploys without a code change.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Guard — RAILWAY_TOKEN must be set
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not configured."
            echo "::error::Add it via Settings → Secrets and variables → Actions."
            echo "::error::Generate a project-scoped token: Railway dashboard → reviewguide-backend → Settings → Tokens → New Token"
            exit 1
          fi
          echo "RAILWAY_TOKEN present (len: ${#RAILWAY_TOKEN})"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Pin commit SHA for /health
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # `railway up` is a SOURCE-UPLOAD deploy, so Railway does NOT inject
        # RAILWAY_GIT_COMMIT_SHA the way a GitHub-connected (native) deploy
        # would — which is why /health's `.version` read "unknown" once this
        # workflow became the de-facto deployer. Set the GIT_SHA service
        # variable (which health._running_version() reads at runtime) to this
        # commit so the SHA-vs-HEAD "is it actually deployed?" check works again.
        # --skip-deploys so this doesn't kick off its own deploy; the `railway
        # up` step below ships with the value applied, and each run self-corrects
        # it to the new commit. GIT_SHA (not the reserved RAILWAY_* namespace) to
        # avoid Railway rejecting a reserved-prefix variable.
        run: |
          railway variables \
            --service backend \
            --set "GIT_SHA=${{ github.sha }}" \
            --skip-deploys

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # `railway up` uploads the checked-out source and triggers a fresh
        # build+deploy on Railway — this deploys the current commit, which
        # is exactly what we need when the primary Railway webhook missed a push.
        #
        # `railway redeploy` was used previously but is wrong for this purpose:
        # it only redeploys the last successful deployment (same old SHA) and
        # does not accept --project, --environment, or --from-source flags.
        #
        # `railway up` respects .gitignore and auto-excludes node_modules, so
        # the uploaded archive stays small. The .railwayignore at the repo root
        # additionally excludes frontend/ and other non-backend paths to keep
        # the tarball lean (the OOM on the 2026-05-25 manual deploy was caused
        # by node_modules being included; that can't happen here).
        #
        # `--ci` streams build logs and exits when the build completes;
        # the runner timeout (15 min) is the backstop for hung builds.
        #
        # Project / environment / service IDs are non-secret identifiers
        # for the reviewguide-backend project. If these ever change
        # (project rename, env clone, service migration), update them here.
        run: |
          railway up \
            --project 0827e58a-47ff-4199-8fae-4f634a8384e8 \
            --environment 9db39bf6-45d6-40ca-acbe-c627b43b710e \
            --service backend \
            --ci
