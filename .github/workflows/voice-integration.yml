name: Voice Integration

# Three-job matrix gating voice quality on every PR / push that touches
# prompts, agents, composer tools, or the voice test files.
#
# 1. voice-foundation — deterministic, no API. Runs the unit tests
#    (test_voice_prompt + test_voice_compliance) and the structural
#    wiring tests from test_voice_integration. Merge-blocking. Gates
#    the two live jobs — if foundation fails we don't burn API quota.
#
# 2. voice-live-prod-model — live LLM compliance against
#    settings.COMPOSER_MODEL = gpt-4o-mini. THIS is the gate that mirrors
#    production. The PR #6 post-merge regression happened because the
#    CI only tested Claude while prod ran gpt-4o-mini — the two model
#    families had different instruction-following behavior on the same
#    prompts. Merge-blocking when OPENAI_API_KEY is configured; skips
#    cleanly otherwise (still safe to merge — the structural layer
#    above is the floor).
#
# 3. voice-live-claude — same live tests but with USE_ANTHROPIC_COMPOSE
#    routing composer calls to Claude. Non-blocking (continue-on-error)
#    because the prod model is gpt-4o-mini and we don't want a Claude
#    regression to block PRs; this is signal for "what would change if
#    we swapped to Claude" rather than a gate.
#
# 4. clarifier-eval — Outcome 10. Runs the clarifier question-quality
#    eval (backend/eval/clarifier_eval.py): production question
#    generation for every curated category pack, scored against the
#    pack (slot order, options, multi-select flags, budget brackets).
#    Non-blocking (continue-on-error) — drift signal, not a gate.
#    Skips cleanly when OPENAI_API_KEY isn't available (fork PRs).
#
# Pin protection: every live job runs a startup assertion that
# settings.COMPOSER_MODEL matches the CI_COMPOSER_MODEL env pin. If a
# future PR changes settings.COMPOSER_MODEL default without updating
# this workflow, the assertion fails loud — silent drift is what caused
# the PR #6 regression.
#
# See backend/tests/test_voice_integration.py for the two-layer rationale.

on:
  pull_request:
    paths:
      - 'backend/app/services/prompts/**'
      - 'backend/mcp_server/tools/**'
      - 'backend/app/agents/**'
      - 'backend/tests/test_voice_*.py'
      - 'backend/eval/**'
      - '.github/workflows/voice-integration.yml'
  push:
    branches: [main, feat/voice-rebuild, feat/voice-hotfix]
    paths:
      - 'backend/app/services/prompts/**'
      - 'backend/mcp_server/tools/**'
      - 'backend/app/agents/**'
      - 'backend/tests/test_voice_*.py'
      - 'backend/eval/**'
      - '.github/workflows/voice-integration.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # The OpenAI fallback model (settings.COMPOSER_MODEL). Used only when
  # OpenRouter is unkeyed. Update BOTH this and backend/app/core/config.py
  # in lockstep when rotating it.
  CI_COMPOSER_MODEL: gpt-4o-mini
  # The model prod ACTUALLY composes with: generate_compose routes via
  # OpenRouter (USE_OPENROUTER_COMPOSE default True + OPENROUTER_API_KEY on
  # Railway), so the effective compose model is OPENROUTER_COMPOSE_MODEL — NOT
  # the fallback above. The effective-model pin step enforces this; pinning
  # only COMPOSER_MODEL let the real model drift unnoticed (PR #6 class).
  CI_OPENROUTER_COMPOSE_MODEL: anthropic/claude-haiku-4.5

jobs:
  voice-foundation:
    name: Voice foundation (deterministic, no API)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Foundation unit tests
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: sk-test-placeholder
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        run: python -m pytest tests/test_voice_prompt.py tests/test_voice_compliance.py -v
      - name: Structural wiring tests
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: sk-test-placeholder
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        run: python -m pytest tests/test_voice_integration.py -v -m "not integration"
      - name: Composer-model pin assertion
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          # ADMIN_PASSWORD is required by Settings() validation. The pytest
          # steps above get this from conftest.py at module-load; this step
          # runs `python -c` outside pytest, so we must set it explicitly.
          ADMIN_PASSWORD: test-admin-password
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: sk-test-placeholder
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
          CI_COMPOSER_MODEL: ${{ env.CI_COMPOSER_MODEL }}
        run: |
          python -c "
          import os
          from app.core.config import settings
          pin = os.environ['CI_COMPOSER_MODEL']
          actual = settings.COMPOSER_MODEL
          assert actual == pin, (
              f'CI pin drift: settings.COMPOSER_MODEL={actual!r} but '
              f'CI_COMPOSER_MODEL={pin!r}. Update both in lockstep '
              '(backend/app/core/config.py + .github/workflows/voice-integration.yml). '
              'Silent drift is what caused the PR #6 post-merge voice regression.'
          )
          print(f'pin OK: composer model = {actual}')
          "
      - name: Effective compose-model pin assertion (the model prod really runs)
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD: test-admin-password
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: sk-test-placeholder
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
          CI_OPENROUTER_COMPOSE_MODEL: ${{ env.CI_OPENROUTER_COMPOSE_MODEL }}
        # Prod composes via OpenRouter, so COMPOSER_MODEL (gpt-4o-mini) is only
        # the fallback. This pins the EFFECTIVE model — a change to the real
        # compose model now fails CI instead of shipping silently.
        run: |
          python -c "
          import os
          from app.core.config import settings
          pin = os.environ['CI_OPENROUTER_COMPOSE_MODEL']
          assert settings.USE_OPENROUTER_COMPOSE is True, (
              'USE_OPENROUTER_COMPOSE default flipped off — prod compose routing changed. '
              'Update config.py + this workflow in lockstep.'
          )
          actual = settings.OPENROUTER_COMPOSE_MODEL
          assert actual == pin, (
              f'Effective compose-model drift: settings.OPENROUTER_COMPOSE_MODEL={actual!r} '
              f'but CI_OPENROUTER_COMPOSE_MODEL={pin!r}. This is the model prod ACTUALLY '
              'runs — update both in lockstep (config.py + voice-integration.yml).'
          )
          print(f'effective-model pin OK: compose model = {actual} (via OpenRouter)')
          "

  voice-live-fallback-model:
    name: Voice live compliance (gpt-4o-mini — OpenAI FALLBACK path)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: voice-foundation
    # NOTE: this exercises the OpenAI fallback (gpt-4o-mini) — the path prod
    # uses only when OpenRouter is unkeyed. The generate()-based compose tools
    # (intro/unclear/general_compose) run here; product_compose's real model is
    # gated in voice-live-openrouter below. Kept because the fallback must also
    # stay voice-clean.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Live compliance — gpt-4o-mini (OpenAI fallback)
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          # Routes composer calls to OpenAI gpt-4o-mini (the fallback).
          # OpenRouter + Anthropic deliberately omitted so generate_compose
          # falls through to COMPOSER_MODEL.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        # Run only the @integration tests; foundation already covered
        # structural in the prior job.
        run: python -m pytest tests/test_voice_integration.py -v -m integration

  voice-live-openrouter:
    name: Voice live compliance (Haiku 4.5 via OpenRouter — REAL prod-model gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: voice-foundation
    # THE honest prod-model gate: product_compose routes via generate_compose →
    # OpenRouter, so this is the only job that exercises the model prod actually
    # composes with (OPENROUTER_COMPOSE_MODEL = Haiku 4.5). Merge-blocking when
    # the OPENROUTER_API_KEY secret is configured; the single live test skips
    # cleanly (job green) when it isn't (fork PRs / secret unset).
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Live compliance — Haiku 4.5 via OpenRouter (prod compose path)
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          # The real prod compose route: OpenRouter on, pinned to the effective
          # model. The product_compose live test skips cleanly without a real key.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-test-placeholder' }}
          USE_OPENROUTER_COMPOSE: 'true'
          OPENROUTER_COMPOSE_MODEL: ${{ env.CI_OPENROUTER_COMPOSE_MODEL }}
          # Single consolidated call (Tier 3a) — matches prod and keeps the live
          # test to one OpenRouter round-trip.
          USE_CONSOLIDATED_COMPOSE: 'true'
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        run: python -m pytest tests/test_voice_integration.py -v -m integration -k openrouter

  clarifier-eval:
    name: Clarifier question quality (non-blocking signal)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: voice-foundation
    # Non-blocking — this measures clarifier question-quality drift against
    # the curated category packs; it is signal, not a merge gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Eval smoke tests (deterministic, no API)
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD: test-admin-password
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: sk-test-placeholder
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        run: python -m pytest eval/test_clarifier_eval_smoke.py eval/test_eval_smoke.py -v
      - name: Clarifier eval — live (production model)
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD: test-admin-password
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          # Real key when configured; the eval skips cleanly on the placeholder.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        run: python -m eval.clarifier_eval --ci
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clarifier-eval-results
          path: backend/eval/results/
          if-no-files-found: ignore

  voice-live-claude:
    name: Voice live compliance (Claude — non-blocking signal)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: voice-foundation
    # Non-blocking — prod runs gpt-4o-mini, so a Claude divergence is
    # signal ("would the swap to Claude work?") not a gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Live compliance — Claude (secondary, non-blocking)
        working-directory: backend
        env:
          ENV: test
          SECRET_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          REDIS_URL: 'redis://localhost:6379/0'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_ANTHROPIC_COMPOSE: 'true'
          RATE_LIMIT_ENABLED: 'false'
          LOG_ENABLED: 'false'
        run: python -m pytest tests/test_voice_integration.py -v -m integration
