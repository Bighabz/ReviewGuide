<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ReviewGuide — mobile design</title>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    body { font-family: -apple-system, BlinkMacSystemFont, "DM Sans", system-ui, sans-serif; }
    #root { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <!-- React + Babel pinned versions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tokens load first (plain JS, must run before any JSX uses window.RG) -->
  <script src="lib/tokens.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Canvas wrapper -->
  <script type="text/babel" data-presets="react" src="design-canvas.jsx"></script>

  <!-- Atoms + screens -->
  <script type="text/babel" data-presets="react" src="lib/atoms.jsx"></script>
  <script type="text/babel" data-presets="react" src="lib/logo.jsx"></script>
  <script type="text/babel" data-presets="react" src="lib/foundation.jsx"></script>
  <script type="text/babel" data-presets="react" src="lib/screens-flow.jsx"></script>
  <script type="text/babel" data-presets="react" src="lib/screens-results.jsx"></script>
  <script type="text/babel" data-presets="react" src="lib/screens-meta.jsx"></script>
  <script type="text/babel" data-presets="react" src="lib/v2-delta.jsx"></script>

  <!-- App composes the canvas -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
